<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Clockwise leftâ†’right through TOP (text appears in ring, reads Lâ†’R) -->
    <path id="rvTopArc" d="M 14,100 A 86,86 0 0,1 186,100"/>
    <!-- Counter-clockwise leftâ†’right through BOTTOM (text appears in ring, reads Lâ†’R) -->
    <path id="rvBotArc" d="M 14,100 A 86,86 0 0,0 186,100"/>
  </defs>

  <!-- White background disc -->
  <circle cx="100" cy="100" r="99" fill="white"/>

  <!-- Navy filled ring band -->
  <circle cx="100" cy="100" r="97" fill="#1a3a8f"/>

  <!-- White centre -->
  <circle cx="100" cy="100" r="78" fill="white"/>

  <!-- Inner ring border -->
  <circle cx="100" cy="100" r="76" fill="none" stroke="#1a3a8f" stroke-width="2"/>

  <!-- RELIAVOLT SUPPLY â€” curved white text along top of ring -->
  <text font-size="12" font-family="Arial,Helvetica,sans-serif" font-weight="900"
        fill="white" letter-spacing="2">
    <textPath href="#rvTopArc" startOffset="50%" text-anchor="middle">RELIAVOLT SUPPLY</textPath>
  </text>

  <!-- Decorative dots at 9 and 3 o'clock -->
  <circle cx="12"  cy="100" r="2.5" fill="white"/>
  <circle cx="188" cy="100" r="2.5" fill="white"/>

  <!-- WE GO FOR VALUE â€” curved light-red text along bottom of ring -->
  <text font-size="11" font-family="Arial,Helvetica,sans-serif" font-weight="700"
        fill="#fca5a5" letter-spacing="1.2">
    <textPath href="#rvBotArc" startOffset="50%" text-anchor="middle">WE GO FOR VALUE</textPath>
  </text>

  <!-- RS Monogram â€” large italic Impact in centre -->
  <text x="100" y="126" text-anchor="middle"
        font-family="Impact,Arial Black,sans-serif" font-size="88" font-style="italic">
    <tspan fill="#1a3a8f">R</tspan><tspan fill="#dc2626">S</tspan>
  </text>
</svg>
