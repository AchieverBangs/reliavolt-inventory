<!DOCTYPE html>
<html lang="en">
<head>
    <script>try{if(localStorage.getItem('rv_theme')=== 'dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Reliavolt Supply</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

    <div class="login-card">
        <div class="login-brand">
            <img src="images/logo.svg" class="brand-logo" alt="Reliavolt Supply">
            <h1>Reliavolt <span class="brand-supply">Supply</span></h1>
            <p class="slogan">"We Go For Value"</p>
        </div>

        <p class="login-form-title">Sign in to your account</p>

        <div class="input-group">
            <label for="username">Username</label>
            <div class="input-with-icon">
                <span class="icon">👤</span>
                <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
            </div>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <div class="input-with-icon">
                <span class="icon">🔒</span>
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
            </div>
        </div>

        <button class="btn-login" id="loginBtn">Sign In &rarr;</button>

        <div class="login-error" id="loginError">Invalid username or password. Please try again.</div>

        <div style="text-align:center;margin-top:0.75rem;">
            <button id="forgotBtn" style="background:none;border:none;color:#2563eb;font-size:0.85rem;cursor:pointer;text-decoration:underline;">Forgot password?</button>
        </div>

        <!-- Forgot password form -->
        <div id="forgotSection" style="display:none;margin-top:0.75rem;">
            <div style="padding:1rem;background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.2);border-radius:8px;">
                <p style="font-size:0.85rem;color:#475569;margin-bottom:0.75rem;">Enter your email address and we'll send you a reset link.</p>
                <div style="display:flex;gap:0.5rem;">
                    <input type="email" id="forgotEmail" placeholder="your@email.com"
                        style="flex:1;padding:0.6rem 0.75rem;border:1.5px solid #e2e8f0;border-radius:8px;font-size:0.9rem;">
                    <button id="forgotSendBtn"
                        style="padding:0.6rem 1rem;background:#1a3a8f;color:#fff;border:none;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;white-space:nowrap;">
                        Send Link
                    </button>
                </div>
                <div id="forgotMsg" style="display:none;margin-top:0.6rem;font-size:0.82rem;padding:0.5rem 0.75rem;border-radius:6px;"></div>
            </div>
        </div>

        <div class="login-demo-hint">
            Admin: <strong>admin / password</strong> &nbsp;&bull;&nbsp;
            Driver: <strong>sorie / password</strong>
        </div>

        <div class="login-footer">
            &copy; 2025 Reliavolt Supply &bull; Inventory Management System v1.0
        </div>
    </div>

    <script src="js/api.js"></script>
<script src="js/app.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
